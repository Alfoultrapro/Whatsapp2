<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp 2.0 - Beta Tester</title>
    <style>
                body { 
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif; 
            margin: 0; 
            background-color: #0b141a; 
            color: #e9edef; 
            /* Rimosso overflow: hidden da qui per permettere il movimento */
        }
        
        /* Header fisso in alto */
        .header { 
            background-color: #202c33; 
            padding: 15px 15px 0 15px; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }

        /* Contenitore chat con scroll abilitato */
        .chat-container { 
            height: calc(100vh - 110px); /* Sottrae l'altezza dell'header */
            overflow-y: auto; /* Attiva lo scroll verticale */
            -webkit-overflow-scrolling: touch; /* Rende lo scroll fluido su iPhone */
        }

        /* Nascondi la barra dello scroll se vuoi un look più pulito (opzionale) */
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background-color: #374045;
        }

    </style>
</head>
<body>

<div id="main-ui">
    <div class="header">
        <div class="header-top">
            <h1>WhatsApp 2</h1>
            <div style="color: #8696a0;">🔍 &nbsp; ⋮</div>
        </div>
        <div class="tabs">
            <div class="tab">📁</div>
            <div class="tab-active">Chat</div>
            <div class="tab">Stato</div>
            <div class="tab">Chiamate</div>
        </div>
    </div>

    <div class="chat-container" id="list-container">
        </div>
</div>

<div id="chat-window">
    <div class="chat-header">
        <span class="back-btn" onclick="closeChat()">←</span>
        <div class="avatar" id="header-avatar" style="width: 35px; height: 35px; font-size: 16px;"></div>
        <span id="header-name" style="font-weight: bold; margin-left: 10px;"></span>
    </div>
    <div class="messages-area" id="msg-area"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Scrivi un messaggio...">
        <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
</div>

<script>
    const chats = [
        { id: 'mamma', name: 'Mamma ❤️', last: 'Hai mangiato?', icon: '👩‍🍳', resp: 'sei adottato' },
        { id: 'pesce', name: 'Pesce Rosso (RIP)', last: 'Glub glub...', icon: '🐠', resp: 'ki te muort me fatt muri e fam' },
        { id: 'classe', name: 'GRUPPO CLASSE 📚', last: 'Quaglietta obbeso: Raga i compiti?', icon: '👨‍🎓', resp: 'visualizzato' },
        { id: 'bibi', name: 'Joker', last: 'Ora parlo io', icon: '😲', resp: 'ORA parlo io' },
        { id: 'ciccio', name: 'CiccioGamer89', last: 'Kekko!', icon: '🍔', resp: 'no ora faccio la denuncia' },
        { id: 'bossetti', name: 'Massimo Bossetti', last: '#FreeBossetti', icon: '⛓️', resp: 'sono innocente giuro' },
        { id: 'hitler', name: 'Adolf hitler', last: 'Heil', icon: '🫡', resp: 'Nein! Lo sapevo che dovevo sterminarli tutti!' },
        { id: 'sal', name: 'Sal Da Vinci', last: 'Sanremo 2026', icon: '🎤', resp: 'Saremo io e te\nPer sempre\nLegati per la vita che\nSenza te\nNon vale niente\nNon ha senso vivere\nCon la mano sul petto\nIo te lo prometto\nDavanti a Dio\nSaremo io e te\nAccussì\nSarrà pe sempe sì' },
        { id: 'gesu', name: 'Gesù', last: 'scusa come mi hai chiamato?', icon: '✝️', resp: 'la prossima volta che mi chiami porco ti scomunico dalla vita' },
    { id: 'giovanni', name: 'giovanni', last: 'io dico...', icon: '🏳️‍🌈', resp: 'sei gay' },
    { id: 'kebab', name: 'kebabbaro', last: 'kebab 5€', icon: '🥙', resp: 'salsa yogurt o piccante?' },
    { id: 'trump', name: 'donald trump', last: 'sono il miglior presidente americano', icon: '🇺🇸', resp: '104 milioni di $ a israele, ORA!' },
    
    ];

    let currentId = '';

    // Funzione per mostrare le chat (chiamata all'avvio)
    function renderChats() {
        const container = document.getElementById('list-container');
        container.innerHTML = ''; // Pulisce
        chats.forEach(c => {
            container.innerHTML += `
                <div class="chat-item" onclick="openChat('${c.id}')">
                    <div class="avatar">${c.icon}</div>
                    <div class="chat-info">
                        <div class="chat-main"><span class="chat-name">${c.name}</span></div>
                        <span class="chat-msg">${c.last}</span>
                    </div>
                </div>`;
        });
    }

    function openChat(id) {
        currentId = id;
        const chat = chats.find(c => c.id === id);
        document.getElementById('header-name').innerText = chat.name;
        document.getElementById('header-avatar').innerText = chat.icon;
        document.getElementById('msg-area').innerHTML = `<div class="msg received" style="font-size: 11px; align-self: center; background: #182229; color: #8696a0; text-align: center;">I messaggi sono protetti con crittografia aliena di WhatsApp 2.</div>`;
        document.getElementById('chat-window').style.display = 'flex';
    }

    function closeChat() {
        document.getElementById('chat-window').style.display = 'none';
    }

    function sendMsg() {
        const input = document.getElementById('user-input');
        if(!input.value) return;
        
        appendMsg(input.value, 'sent');
        input.value = '';

        setTimeout(() => {
            const chat = chats.find(c => c.id === currentId);
            if(chat.resp === 'visualizzato') {
                const messages = document.querySelectorAll('.sent');
                const lastSent = messages[messages.length - 1];
                if (!lastSent.innerHTML.includes('ticks')) {
                    lastSent.innerHTML += '<span class="ticks"> ✔✔</span>';
                }
            } else {
                appendMsg(chat.resp, 'received');
            }
        }, 1200);
    }

    function appendMsg(text, type) {
        const area = document.getElementById('msg-area');
        const div = document.createElement('div');
        div.className = 'msg ' + type;
        div.innerText = text;
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
    }

    // FACCIAMO PARTIRE IL CARICAMENTO DOPO CHE LA PAGINA È PRONTA
    window.onload = renderChats;
</script>
</body>
</html>
